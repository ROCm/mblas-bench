# Emulated FP64 GEMM benchmark - all combinations
# M=N=K=4096, driver=cublaslt, function=matmul

# === Baseline: Native FP64 ===
- driver: cublaslt
  function: matmul
  m: 4096
  n: 4096
  k: 4096
  precision: f64_r
  compute_type: CUBLAS_COMPUTE_64F

- driver: cublaslt
  function: matmul
  m: 4096
  n: 4096
  k: 4096
  precision: f64_r
  compute_type: CUBLAS_COMPUTE_64F_PEDANTIC

